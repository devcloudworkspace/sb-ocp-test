apiVersion: v1
kind: Namespace
metadata:
  name: pt
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-checkout
  namespace: pt
spec:
  params:
    - name: git-url
      type: string
    - name: git-branch
      type: string
  workspaces:
    - name: source
  results:
    - name: commit-sha
  steps:
    - name: git-clone
      image: alpine/git:2.43.0
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Checking out git repo"
        git clone --branch $(params.git-branch) --depth 1 $(params.git-url) .
        git rev-parse HEAD | tr -d '\n' > $(results.commit-sha.path)
        echo "Checked out $(params.git-url) at $(cat $(results.commit-sha.path))"
        ls
        echo "Files List"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build
  namespace: pt
spec:
  workspaces:
    - name: source
  steps:
    - name: build
      image: maven:3.8.4-openjdk-17-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        ls
        echo "Files List"
        mvn clean install
        echo "Build completed successfully"
