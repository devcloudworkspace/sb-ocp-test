  name: kaniko-sa
secrets:
  - name: kaniko-secret
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
  namespace: pt
spec:
  params:
    - name: image-name
      type: string
  workspaces:
    - name: output
  steps:
    - serviceAccountName: kaniko-sa
      name: build-image
      image: gcr.io/kaniko-project/executor:v1.19.0
      args:
        - "--dockerfile=$(workspaces.output.path)/Dockerfile"
        - "--context=$(workspaces.output.path)"
        - "--destination=$(params.image-name)"
        # - "--no-push"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-deploy
  namespace: pt
spec:
  params:
    - name: git-url
      type: string
    - name: git-branch
      type: string
    - name: image-name
      type: string
  workspaces:
    - name: shared-workspace
  tasks:
    - name: checkout
      taskRef:
        name: git-checkout
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-branch
          value: $(params.git-branch)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build
      taskRef:
        name: build
      runAfter:
        - checkout
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build-image
      taskRef:
        name: build-image
      runAfter:
        - build
      params:
        - name: image-name
          value: $(params.image-name)
      workspaces:
        - name: output
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-deploy-
  namespace: pt
spec:
  pipelineRef:
    name: build-deploy
  params:
    - name: git-url
      value: https://github.com/devcloudworkspace/sb-ocp-test.git
    - name: git-branch
      value: "main"
    - name: image-name
      value: quay.io/devcloud1user2/myrepo/sb-ocp-test:1.0.0
  workspaces:
    - name: shared-workspace
      # emptyDir: {}
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi